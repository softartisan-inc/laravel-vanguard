[changelog]
header = """
# Changelog\n
All notable changes to `softartisan/vanguard` are documented here.\n
The format follows [Keep a Changelog](https://keepachangelog.com/en/1.0.0/).
This project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.id }}))\
{% endfor %}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat",     group = "Added" },
    { message = "^fix",      group = "Fixed" },
    { message = "^perf",     group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^revert",   group = "Reverted" },
    { message = "^style",    group = "Changed" },
    { message = "^test",     skip = true },
    { message = "^chore",    skip = true },
    { message = "^ci",       skip = true },
    { message = "^docs",     group = "Documentation" },
    { message = "^security", group = "Security" },
    { body    = ".*security", group = "Security" },
]
filter_commits = true
tag_pattern = "v[0-9].*"
skip_tags = "v0\\.1\\.0-beta\\.1"
ignore_tags = ""
date_order = false
sort_commits = "oldest"
